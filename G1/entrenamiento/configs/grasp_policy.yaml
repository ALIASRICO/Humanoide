  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 1.0
  num_epochs: 5
  minibatch_size: 1024
  total_iterations: 50000
  save_interval: 1000
  log_interval: 100

export:
  output_path: "politicas/model_grasp_jit.pt"
  input_dim: 103
  output_dim: 28
