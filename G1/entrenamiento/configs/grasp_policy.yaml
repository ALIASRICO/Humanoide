obs:
  pos_caja_rel: 3
  orient_caja_quat: 4
  q_arm_left: 7
  q_arm_right: 7
  q_finger_left: 7
  q_finger_right: 7
  dq_arm_left: 7
  dq_arm_right: 7
  dq_finger_left: 7
  dq_finger_right: 7
  touch_left: 6
  touch_right: 6
  prev_action: 28
  total: 103

actor:
  input_dim: 103
  hidden_dims: [512, 256, 128]
  activation: elu
  output_dim: 28
  output_activation: tanh
  action_scale: 1.0

critic:
  input_dim: 103
