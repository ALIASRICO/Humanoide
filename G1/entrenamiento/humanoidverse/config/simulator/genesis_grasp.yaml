# @package _global_

simulator:
  _target_: humanoidverse.simulator.genesis.genesis_grasp.GenesisGrasp
  _recursive_: False
  config:
    name: "genesis_grasp"
    terrain: ${terrain}
    plane:
        static_friction: 1.0
        dynamic_friction: 1.0
        restitution: 0.0
    sim:
      fps: 200
      control_decimation: 4
      substeps: 1
      render_mode: "human"
      render_interval: 1
    scene:
      num_envs: ${num_envs}
      env_spacing: ${env.config.env_spacing}
      replicate_physics: True
