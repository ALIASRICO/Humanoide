# @package _global_

obs:
  obs_dict:
    actor_obs: [
      base_lin_vel,
      base_ang_vel,
      projected_gravity,
      command_lin_vel,
      command_ang_vel,
      dof_pos,
      dof_vel,
      actions,
    ]
    critic_obs: [
      base_lin_vel,
      base_ang_vel,
      projected_gravity,
      command_lin_vel,
      command_ang_vel,
      dof_pos,
      dof_vel,
      actions,
    ]

  obs_auxiliary:
    history_long: {dof_pos: 20, dof_vel: 2, actions: 15}
    history_short: {dof_pos: 3, dof_vel: 2, actions: 1}

  obs_scales: {
    base_lin_vel: 2.0,
    base_ang_vel: 0.25,
    projected_gravity: 1.0,
    command_lin_vel: 1.0,
    command_ang_vel: 1.0,
    dof_pos: 1.0,
    dof_vel: 0.05,
    history: 1.0,
    actions: 1.0,
  }

  noise_scales: {
    base_lin_vel: 0.1,
    base_ang_vel: 0.05,
    projected_gravity: 0.05,
    command_lin_vel: 0.0,
    command_ang_vel: 0.0,
    dof_pos: 0.01,
    dof_vel: 0.5,
    actions: 0.0,
    history: 0.0,
  }

  obs_dims:
    - base_lin_vel: 3
    - base_ang_vel: 3
    - projected_gravity: 3
    - command_lin_vel: 2
    - command_ang_vel: 1
    - dof_pos: ${robot.dof_obs_size}
    - dof_vel: ${robot.dof_obs_size}
    - actions: ${robot.dof_obs_size}
