# Config para política HumanoidVerse CON Domain Randomization
policy_path: "{REPO_ROOT}/politicas/model_DR_jit.pt"
xml_path: "{REPO_ROOT}/escenas/g1_description/scene.xml"

simulation_duration: 60.0
simulation_dt: 0.002
control_decimation: 10

kps: [100, 100, 100, 200, 20, 20, 100, 100, 100, 200, 20, 20]
kds: [2.5, 2.5, 2.5, 5.0, 0.2, 0.1, 2.5, 2.5, 2.5, 5.0, 0.2, 0.1]

default_angles: [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0,
                 -0.1, 0.0, 0.0, 0.3, -0.2, 0.0]

lin_vel_scale:  2.0
ang_vel_scale:  0.25
dof_pos_scale:  1.0
dof_vel_scale:  0.05

action_scale: 0.25
num_actions: 12
num_obs: 48

cmd_init: [0.5, 0.0, 0.0]

# Controlador de rumbo dinamico (0.0 = desactivado)
# Aumentar si el robot deriva; bajar si oscila de izquierda a derecha
heading_kp: 2.0
