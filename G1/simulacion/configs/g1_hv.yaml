# Config para política entrenada con HumanoidVerse + Genesis
# Obs: 48 dims (base_lin_vel×2 + base_ang_vel×0.25 + gravity + cmd_lin + cmd_ang + dof_pos + dof_vel×0.05 + actions)
# Sin phase sin/cos, sin escala de comando

policy_path: "{REPO_ROOT}/politicas/model_7000_jit.pt"
xml_path: "{REPO_ROOT}/escenas/g1_description/scene.xml"

simulation_duration: 60.0
simulation_dt: 0.002
control_decimation: 10   # 50 Hz de control, igual que en entrenamiento (dt=0.002, substeps para HV)

# Ganancias PD del entrenamiento HumanoidVerse g1_12dof.yaml
# Orden: [lhip_pitch, lhip_roll, lhip_yaw, lknee, lankle_pitch, lankle_roll,
#          rhip_pitch, rhip_roll, rhip_yaw, rknee, rankle_pitch, rankle_roll]
kps: [100, 100, 100, 200, 20, 20, 100, 100, 100, 200, 20, 20]
kds: [2.5, 2.5, 2.5, 5.0, 0.2, 0.1, 2.5, 2.5, 2.5, 5.0, 0.2, 0.1]

default_angles: [-0.1, 0.0, 0.0, 0.3, -0.2, 0.0,
                 -0.1, 0.0, 0.0, 0.3, -0.2, 0.0]

# Escalas de observación usadas en entrenamiento (leggedloco_obs_singlestep_withlinvel.yaml)
lin_vel_scale:  2.0    # base_lin_vel (body frame)
ang_vel_scale:  0.25   # base_ang_vel (body frame)
dof_pos_scale:  1.0    # dof_pos - default
dof_vel_scale:  0.05   # dof_vel

action_scale: 0.25
num_actions: 12
num_obs: 48

cmd_init: [0.5, 0.0, 0.0]   # [vx m/s, vy m/s, wz rad/s]
